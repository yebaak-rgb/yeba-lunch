<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점심 수량 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

<!-- ✅ Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signOut, GoogleAuthProvider, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ============================================================
// ✅ 1. 여기에 Firebase 프로젝트 설정값을 붙여넣으세요
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyCT4JjQiXlM334oO8wEAM7e8huSLtOuAD4",
  authDomain: "yeba-lunch.firebaseapp.com",
  projectId: "yeba-lunch",
  storageBucket: "yeba-lunch.firebasestorage.app",
  messagingSenderId: "431430508078",
  appId: "1:431430508078:web:55db4b6df9e1e5b2ef89bf"
};

// ============================================================
// ✅ 2. 부서별 공용 계정 이메일을 실제 이메일로 바꾸세요
// ============================================================
const DEPT_MAP = {
  "":                      "J팀",
  "":                      "S팀",
  "":                      "L팀",
  "yebakya@gmail.com":     "고지실",
  "":                      "기공실",
  "yeba.sy@gmail.com":     "경지실",
  "yeba.ak@gmail.com":     "기획실",
  "yeba.sy@gmail.com":     "기획실",
};

// ============================================================
// ✅ 3. 기획실 확정 권한 계정 이메일을 실제 이메일로 바꾸세요
// ============================================================
const ADMIN_EMAILS = [
  "yeba.ak@gmail.com",
  "yeba.sy@gmail.com",
  "yeba.jjw@gmail.com",
];

// ─── 상수 ────────────────────────────────────────────────────
const MENUS = ["일반도시락", "샐러드", "김밥", "볶음밥"];
const DAYS  = ["월", "화", "수", "목", "금"];

// ─── Firebase 초기화 ────────────────────────────────────────
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

// ─── 상태 ────────────────────────────────────────────────────
let currentUser = null;
let currentDept = null;
let isAdmin     = false;
let currentWeekKey = null;
let currentDay  = DAYS[0];
let unsubscribe = null;
let weekData    = {};   // Firestore에서 실시간으로 내려오는 전체 데이터

// ─── 주차 계산 ───────────────────────────────────────────────
function getWeeksOf2026() {
  const weeks = [];
  let d = new Date(2026, 0, 5); // 2026-01-05 월요일
  while (d.getFullYear() === 2026) {
    weeks.push({
      label: `${d.getMonth() + 1}월 ${d.getDate()}일 주`,
      key:   `2026-W${String(getISOWeek(d)).padStart(2, "0")}`,
    });
    d.setDate(d.getDate() + 7);
  }
  return weeks;
}
function getISOWeek(d) {
  const tmp = new Date(d.valueOf());
  const day = tmp.getDay() || 7;
  tmp.setDate(tmp.getDate() + 4 - day);
  const y = new Date(tmp.getFullYear(), 0, 1);
  return Math.ceil((((tmp - y) / 86400000) + 1) / 7);
}
function getCurrentWeekIdx(weeks) {
  const now = new Date();
  const nowKey = `2026-W${String(getISOWeek(now)).padStart(2, "0")}`;
  const idx = weeks.findIndex(w => w.key === nowKey);
  return idx >= 0 ? idx : 0;
}

const WEEKS = getWeeksOf2026();

// ─── DOM 준비 후 실행 ────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  // 주차 셀렉트 채우기
  const sel = document.getElementById("weekSel");
  WEEKS.forEach((w, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = w.label; sel.appendChild(o);
  });
  const todayIdx = getCurrentWeekIdx(WEEKS);
  sel.value = todayIdx;
  currentWeekKey = WEEKS[todayIdx].key;

  sel.addEventListener("change", e => {
    currentWeekKey = WEEKS[parseInt(e.target.value)].key;
    subscribeWeek();
  });

  // 로그인 상태 감지
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      currentDept = DEPT_MAP[user.email] || null;
      isAdmin     = ADMIN_EMAILS.includes(user.email);
      showApp();
      subscribeWeek();
    } else {
      showLogin();
    }
  });

  // 버튼 이벤트
  document.getElementById("loginBtn").addEventListener("click", () => {
    signInWithPopup(auth, provider).catch(e => toast("로그인 실패: " + e.message));
  });
  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));
  document.getElementById("confirmBtn").addEventListener("click", confirmWeek);
});

// ─── Firestore 실시간 구독 ────────────────────────────────────
function subscribeWeek() {
  if (unsubscribe) unsubscribe();
  const ref = doc(db, "weeks", currentWeekKey);
  unsubscribe = onSnapshot(ref, snap => {
    weekData = snap.exists() ? snap.data() : { locked: false, orders: {} };
    if (!weekData.orders) weekData.orders = {};
    render();
  });
}

// ─── Firestore 저장 ──────────────────────────────────────────
async function saveQty(dept, day, menu, val) {
  const ref  = doc(db, "weeks", currentWeekKey);
  const snap = await getDoc(ref);
  const data = snap.exists() ? snap.data() : { locked: false, orders: {} };
  if (!data.orders)          data.orders = {};
  if (!data.orders[dept])    data.orders[dept] = {};
  if (!data.orders[dept][day]) data.orders[dept][day] = {};
  data.orders[dept][day][menu] = val;
  await setDoc(ref, data);
}

async function confirmWeek() {
  if (!isAdmin) return;
  if (weekData.locked) { toast("이미 확정된 주입니다."); return; }
  if (!confirm("이번 주를 확정하시겠습니까?\n확정 후에는 모든 부서의 수정이 불가합니다.")) return;
  await updateDoc(doc(db, "weeks", currentWeekKey), { locked: true });
  toast("✓ 확정 완료. 수정이 잠겼습니다.");
}

// ─── 헬퍼 ────────────────────────────────────────────────────
function getQty(dept, day, menu) {
  try { return weekData.orders[dept][day][menu] || 0; } catch { return 0; }
}
function deptHasData(dept) {
  try {
    const o = weekData.orders[dept] || {};
    return DAYS.some(d => MENUS.some(m => (o[d]?.[m] || 0) > 0));
  } catch { return false; }
}

// ─── 화면 전환 ───────────────────────────────────────────────
function showLogin() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appScreen").style.display   = "none";
}
function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appScreen").style.display   = "block";
  document.getElementById("userEmail").textContent = currentUser?.email || "";
  document.getElementById("userDept").textContent  =
    currentDept ? `(${currentDept})` : isAdmin ? "(기획실 — 관리자)" : "(미등록 계정)";
}

// ─── 탭 전환 ────────────────────────────────────────────────
window.switchTab = function(tab, el) {
  document.getElementById("tab-input").style.display   = tab === "input"   ? "" : "none";
  document.getElementById("tab-summary").style.display = tab === "summary" ? "" : "none";
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
};

window.selectDay = function(d) { currentDay = d; render(); };

// ─── 수량 변경 ───────────────────────────────────────────────
window.changeQty = async function(menu, delta) {
  if (!currentDept) { toast("등록되지 않은 계정입니다."); return; }
  if (weekData.locked) { toast("확정된 주입니다. 수정 불가."); return; }
  const cur = getQty(currentDept, currentDay, menu);
  const nv  = Math.max(0, cur + delta);
  // 낙관적 업데이트 (UI 즉시 반영)
  if (!weekData.orders[currentDept]) weekData.orders[currentDept] = {};
  if (!weekData.orders[currentDept][currentDay]) weekData.orders[currentDept][currentDay] = {};
  weekData.orders[currentDept][currentDay][menu] = nv;
  document.getElementById("q_" + menu).textContent = nv;
  try {
    await saveQty(currentDept, currentDay, menu, nv);
  } catch(e) {
    toast("저장 실패: " + e.message);
  }
};

// ─── 렌더 ────────────────────────────────────────────────────
function render() {
  const locked = weekData.locked;

  // 상태 뱃지
  document.getElementById("statusBadge").className   = "badge " + (locked ? "badge-locked" : "badge-open");
  document.getElementById("statusBadge").innerHTML   = locked
    ? '<i class="ti ti-lock"></i> 확정됨'
    : '<i class="ti ti-lock-open"></i> 입력 중';

  // 확정 버튼 (관리자만 표시)
  const cb = document.getElementById("confirmBtn");
  cb.style.display = isAdmin ? "" : "none";
  cb.disabled = locked;
  cb.textContent = locked ? "✓ 확정 완료" : "이번 주 확정";

  renderInputTab(locked);
  renderSummaryTab(locked);
}

function renderInputTab(locked) {
  if (!currentDept && !isAdmin) {
    document.getElementById("tab-input").innerHTML =
      `<div class="notice notice-warn"><i class="ti ti-alert-circle"></i> 등록되지 않은 계정입니다. 관리자에게 문의하세요.</div>`;
    return;
  }
  if (locked) {
    document.getElementById("inputArea").innerHTML =
      `<div class="notice notice-danger"><i class="ti ti-lock"></i> 이번 주는 확정되었습니다. 수정 불가.</div>`;
    renderMyWeekTable();
    return;
  }

  // 요일 탭
  document.getElementById("dayTabs").innerHTML = DAYS.map(d =>
    `<button class="day-btn${d === currentDay ? " active" : ""}" onclick="selectDay('${d}')">${d}요일</button>`
  ).join("");

  // 메뉴 카드
  document.getElementById("menuGrid").innerHTML = MENUS.map(m => `
    <div class="menu-card">
      <p class="menu-label">${m}</p>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${m}',-1)">−</button>
        <span class="qty-val" id="q_${m}">${getQty(currentDept, currentDay, m)}</span>
        <button class="qty-btn" onclick="changeQty('${m}',1)">+</button>
      </div>
    </div>`).join("");

  renderMyWeekTable();
}

function renderMyWeekTable() {
  const dept = currentDept;
  if (!dept) return;
  const el = document.getElementById("myWeekTable");
  if (!el) return;
  // 행=요일, 열=메뉴
  const rows = DAYS.map(d => {
    const vals = MENUS.map(m => getQty(dept, d, m));
    const total = vals.reduce((s,v)=>s+v,0);
    return `<tr>
      <td class="td-label">${d}</td>
      ${vals.map(v=>`<td>${v||""}</td>`).join("")}
      <td class="td-total">${total||""}</td>
    </tr>`;
  }).join("");
  const colTotals = MENUS.map(m => DAYS.reduce((s,d)=>s+getQty(dept,d,m),0));
  const grand = colTotals.reduce((s,v)=>s+v,0);
  el.innerHTML = `
    <p class="section-label" style="margin-top:1.5rem">${dept} 이번 주 입력 현황</p>
    <div style="overflow-x:auto">
    <table class="s-table">
      <thead><tr>
        <th>요일</th>${MENUS.map(m=>`<th>${m}</th>`).join("")}<th>합계</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="tr-total">
          <td class="td-label">합계</td>
          ${colTotals.map(v=>`<td>${v||""}</td>`).join("")}
          <td class="td-total">${grand||""}</td>
        </tr>
      </tbody>
    </table>
    </div>`;
}

function renderSummaryTab(locked) {
  // 부서별 입력 현황
  document.getElementById("deptStatus").innerHTML = Object.entries(DEPT_MAP).map(([email, dept]) =>
    `<span class="badge ${deptHasData(dept) ? "badge-open" : "badge-muted"}">${dept} ${deptHasData(dept) ? "✓" : "미입력"}</span>`
  ).join("");

  // 집계표
  const rows = MENUS.map(m => {
    const vals = DAYS.map(d => DEPTS_LIST().reduce((s, dept) => s + getQty(dept, d, m), 0));
    const total = vals.reduce((s, v) => s + v, 0);
    return `<tr>
      <td class="td-label">${m}</td>
      ${vals.map(v => `<td>${v || ""}</td>`).join("")}
      <td class="td-total">${total || ""}</td>
    </tr>`;
  }).join("");

  const dayTotals = DAYS.map(d =>
    MENUS.reduce((s, m) => s + DEPTS_LIST().reduce((s2, dept) => s2 + getQty(dept, d, m), 0), 0)
  );
  const grandTotal = dayTotals.reduce((s, v) => s + v, 0);

  document.getElementById("summaryTable").innerHTML = `
    <table class="s-table">
      <thead><tr>
        <th>메뉴</th>${DAYS.map(d => `<th>${d}</th>`).join("")}<th>합계</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="tr-total">
          <td class="td-label">합계</td>
          ${dayTotals.map(v => `<td>${v || ""}</td>`).join("")}
          <td class="td-total">${grandTotal || ""}</td>
        </tr>
      </tbody>
    </table>`;
}

function DEPTS_LIST() { return Object.values(DEPT_MAP); }

// ─── 토스트 ──────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  --bg:       #ffffff;

}

    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --green-bg:#173404; --green-tx:#c0dd97;

    --blue-bg:#042c53;  --blue-tx:#85b7eb;
    --amber-bg:#412402; --amber-tx:#fac775;
  }
}
body { font-family: -apple-system, "Pretendard", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── 로그인 화면 ── */

  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; gap: 1.5rem; padding: 2rem;
}
.login-card {
  background: var(--bg2); border: 0.5px solid var(--border);

}
.login-card h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; }

}

#appScreen { display: none; max-width: 680px; margin: 0 auto; padding: 1rem; }

.top-bar {

}

.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.user-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2); border-radius: var(--radius);
  padding: 8px 12px; margin-bottom: 1rem; font-size: 13px; flex-wrap: wrap; gap: 8px;
}
.user-info { color: var(--text2); }
.user-email { font-weight: 500; color: var(--text); }
#logoutBtn {
  font-size: 12px; padding: 4px 10px; border: 0.5px solid var(--border2);
  border-radius: var(--radius); background: none; color: var(--text2); cursor: pointer;
}
#logoutBtn:hover { background: var(--bg3); }

select {
  height: 36px; padding: 0 10px; border: 0.5px solid var(--border2);

  font-size: 14px; cursor: pointer;
}

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; padding: 4px 10px; border-radius: var(--radius);
}
.badge i { font-size: 13px; }
.badge-open   { background: var(--green-bg); color: var(--green-tx); }
.badge-locked { background: var(--red-bg);   color: var(--red-tx); }

.tab-bar {
  display: flex; gap: 2px; border-bottom: 0.5px solid var(--border);
  margin-bottom: 1rem;
}
.tab {
  padding: 8px 16px; font-size: 13px; cursor: pointer;
  border: none; background: none; color: var(--text2);
  border-bottom: 2px solid transparent; margin-bottom: -0.5px;
}
.tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

/* ── 입력 탭 ── */
.section-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.day-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.day-btn {
  padding: 6px 14px; font-size: 13px;
  border: 0.5px solid var(--border); border-radius: var(--radius);
  background: var(--bg); color: var(--text2); cursor: pointer;
}

  border-color: var(--border2); color: var(--text); font-weight: 500;
  background: var(--bg2);
}
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.menu-card {
  background: var(--bg2); border-radius: var(--radius);
  padding: 14px; border: 0.5px solid var(--border);
}
.menu-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
.qty-control { display: flex; align-items: center; gap: 10px; }
.qty-btn {
  width: 30px; height: 30px; border: 0.5px solid var(--border2);
  border-radius: var(--radius); background: var(--bg); color: var(--text);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.qty-btn:hover { background: var(--bg3); }
.qty-val { font-size: 22px; font-weight: 500; min-width: 32px; text-align: center; }

/* ── 집계 탭 ── */
.dept-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
.s-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
.s-table th {
  background: var(--bg2); padding: 8px 6px; text-align: center;
  border: 0.5px solid var(--border); font-weight: 500; font-size: 12px; color: var(--text2);
}
.s-table td { padding: 8px 6px; text-align: center; border: 0.5px solid var(--border); }
.td-label { text-align: left !important; padding-left: 10px !important; }
.td-total { font-weight: 500; }
.tr-total td { background: var(--bg2); font-weight: 500; }

/* ── 확정 버튼 ── */
.action-bar { display: flex; gap: 8px; margin-top: 1.25rem; }
#confirmBtn {
  flex: 1; padding: 10px; background: var(--red-bg); border: none;
  border-radius: var(--radius); color: var(--red-tx); font-size: 14px;
  cursor: pointer; font-weight: 500;
}
#confirmBtn:hover:not(:disabled) { opacity: 0.85; }
#confirmBtn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ── 공통 ── */
.notice {
  border-radius: var(--radius); padding: 12px 14px;
  font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 1rem;
}
.notice-danger { background: var(--red-bg);   color: var(--red-tx); }
.notice-warn   { background: var(--amber-bg); color: var(--amber-tx); }

#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--bg); border: 0.5px solid var(--border2);
  border-radius: var(--radius); padding: 10px 20px;
  font-size: 13px; color: var(--text); opacity: 0;
  transition: opacity 0.25s; pointer-events: none; z-index: 999; white-space: nowrap;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="loginScreen">
  <div class="login-card">
    <h1>🍱 점심 수량 관리</h1>
    <p>부서 공용 구글 계정으로 로그인하면<br>해당 부서의 수량을 입력할 수 있습니다.</p>
    <button id="loginBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Google 계정으로 로그인
    </button>
  </div>
</div>

<!-- ── 앱 화면 ── -->
<div id="appScreen">
  <div class="top-bar">
    <span class="title">🍱 점심 수량 관리</span>
    <div class="controls">
      <select id="weekSel"></select>
      <span id="statusBadge" class="badge badge-open">
        <i class="ti ti-lock-open"></i> 입력 중
      </span>
    </div>
  </div>

  <div class="user-row">
    <span class="user-info">
      <span class="user-email" id="userEmail"></span>
      <span id="userDept" style="margin-left:4px"></span>
    </span>
    <button id="logoutBtn"><i class="ti ti-logout" style="font-size:13px;vertical-align:-1px"></i> 로그아웃</button>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('input', this)">수량 입력</button>
    <button class="tab" onclick="switchTab('summary', this)">집계표</button>
  </div>

  <!-- 입력 탭 -->
  <div id="tab-input">
    <p class="section-label">요일 선택</p>
    <div class="day-tabs" id="dayTabs"></div>
    <p class="section-label" id="menuLabel"></p>
    <div class="menu-grid" id="menuGrid"></div>
    <div id="inputArea"></div>
    <div id="myWeekTable"></div>
  </div>

  <!-- 집계 탭 -->
  <div id="tab-summary" style="display:none">
    <p class="section-label">부서별 입력 현황</p>
    <div class="dept-chips" id="deptStatus"></div>
    <p class="section-label">요일별 집계</p>
    <div style="overflow-x:auto" id="summaryTable"></div>
    <div class="action-bar">
      <button id="confirmBtn" style="display:none">이번 주 확정</button>
    </div>
  </div>
</div>

<div id="toast"></div>
</body>
</html>
