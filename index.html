// ─── 상수 ────────────────────────────────────────────────────
const DEFAULT_MENUS = ["일반도시락", "샐러드", "김밥", "볶음밥"];
let currentMenus = [...DEFAULT_MENUS];
const DAYS  = ["월", "화", "수", "목", "금"];

// ─── Firebase 초기화 ────────────────────────────────────────
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ─── 상태 ────────────────────────────────────────────────────
let currentUser = null;
let currentDept = null;
let isAdmin     = false;
let currentWeekKey = null;
let currentDay  = DAYS[0];
let unsubscribe = null;
let weekData    = {};
let allWeeksCache = {};
let isSaturdayMode = false;

// ─── 주차 계산 ───────────────────────────────────────────────
function getWeeksOf2026() {
  const weeks = [];
  let d = new Date(2026, 0, 5);
  while (d.getFullYear() === 2026) {
    weeks.push({
      label: `${d.getMonth() + 1}월 ${d.getDate()}일 주`,
      key:   `2026-W${String(getISOWeek(d)).padStart(2, "0")}`,
      mon:   new Date(d),
    });
    d.setDate(d.getDate() + 7);
  }
  return weeks;
}
function getISOWeek(d) {
  const tmp = new Date(d.valueOf());
  const day = tmp.getDay() || 7;
  tmp.setDate(tmp.getDate() + 4 - day);
  const y = new Date(tmp.getFullYear(), 0, 1);
  return Math.ceil((((tmp - y) / 86400000) + 1) / 7);
}
function getCurrentWeekIdx(weeks) {
  const now = new Date();
  const nowKey = `2026-W${String(getISOWeek(now)).padStart(2, "0")}`;
  const idx = weeks.findIndex(w => w.key === nowKey);
  return idx >= 0 ? idx : 0;
}

const WEEKS = getWeeksOf2026();

// ─── DOM 준비 후 실행 ────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  // 달력 초기화
  const todayIdx = getCurrentWeekIdx(WEEKS);
  curWeekIdx = todayIdx >= 0 ? todayIdx : 0;
  currentWeekKey = WEEKS[curWeekIdx].key;
  renderCalendar();

  // 로그인 상태 감지
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      isAdmin     = ADMIN_EMAILS.includes(user.email);
      currentDept = DEPT_MAP[user.email] || (isAdmin ? "기획실" : null);
      showApp();
      subscribeWeek();
    } else {
      showLogin();
    }
  });

  // 버튼 이벤트
  document.getElementById("loginBtn").addEventListener("click", () => {
    signInWithPopup(auth, provider).catch(e => toast("로그인 실패: " + e.message));
  });
  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));
  document.getElementById("confirmBtn").addEventListener("click", confirmWeek);
});

// ─── Firestore 실시간 구독 ────────────────────────────────────
function subscribeWeek() {
  if (unsubscribe) unsubscribe();
  const ref = doc(db, "weeks", currentWeekKey);
  unsubscribe = onSnapshot(ref, snap => {
    weekData = snap.exists() ? snap.data() : { locked: false, orders: {} };
    if (!weekData.orders) weekData.orders = {};
    if (isSaturdayMode) {
      currentMenus = (weekData.satMenus && weekData.satMenus.length > 0) ? weekData.satMenus : [...DEFAULT_MENUS];
    } else {
      currentMenus = (weekData.menus && weekData.menus.length > 0) ? weekData.menus : [...DEFAULT_MENUS];
    }
    allWeeksCache[currentWeekKey] = weekData;
    render();
  });
}

// ─── Firestore 저장 ──────────────────────────────────────────
async function saveQty(dept, day, menu, val) {
  const ref  = doc(db, "weeks", currentWeekKey);
  const snap = await getDoc(ref);
  const data = snap.exists() ? snap.data() : { locked: false, orders: {} };
  if (!data.orders)          data.orders = {};
  if (!data.orders[dept])    data.orders[dept] = {};
  if (!data.orders[dept][day]) data.orders[dept][day] = {};
  data.orders[dept][day][menu] = val;
  await setDoc(ref, data);
}

async function confirmWeek() {
  if (!isAdmin) return;
  if (weekData.locked) { toast("이미 확정된 주입니다."); return; }
  if (!confirm("이번 주를 확정하시겠습니까?\n확정 후에는 모든 부서의 수정이 불가합니다.")) return;
  await updateDoc(doc(db, "weeks", currentWeekKey), { locked: true });
  toast("✓ 확정 완료. 수정이 잠겼습니다.");
}

window.unlockWeek = async function() {
  if (!isAdmin) return;
  if (!confirm("확정을 해제하고 수정 가능 상태로 되돌리겠습니까?")) return;
  const ref = doc(db, "weeks", currentWeekKey);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    await updateDoc(ref, { locked: false });
  } else {
    await setDoc(ref, { locked: false, orders: {} });
  }
  toast("잠금이 해제되었습니다. 수정 가능합니다.");
};

// ─── 헬퍼 ────────────────────────────────────────────────────
function getQty(dept, day, menu) {
  try { return weekData.orders[dept][day][menu] || 0; } catch { return 0; }
}
function deptHasData(dept) {
  try {
    const o = weekData.orders[dept] || {};
    if (isSaturdayMode) {
      const satMenus = (weekData.satMenus && weekData.satMenus.length > 0) ? weekData.satMenus : DEFAULT_MENUS;
      return satMenus.some(m => (o["토"]?.[m] || 0) > 0);
    }
    return DAYS.some(d => currentMenus.some(m => (o[d]?.[m] || 0) > 0));
  } catch { return false; }
}

// ─── 화면 전환 ───────────────────────────────────────────────
function showLogin() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("appScreen").style.display   = "none";
}
function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appScreen").style.display   = "block";
  document.getElementById("userEmail").textContent = currentUser?.email || "";
  document.getElementById("userDept").textContent  =
    currentDept ? `(${currentDept})` : isAdmin ? "(기획실 — 관리자)" : "(미등록 계정)";
}

// ─── 탭 전환 ────────────────────────────────────────────────
window.switchTab = function(tab, el) {
  document.getElementById("tab-input").style.display   = tab === "input"   ? "" : "none";
  document.getElementById("tab-summary").style.display = tab === "summary" ? "" : "none";
  document.getElementById("tab-billing").style.display = tab === "billing" ? "" : "none";
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  if (tab === "billing") renderBillingTab();
};

window.selectDay = function(d) { currentDay = d; render(); };

// ─── 수량 변경 ───────────────────────────────────────────────
window.changeQty = async function(menu, delta) {
  const dept = currentDept || (isAdmin ? "기획실" : null);
  if (!dept) { toast("등록되지 않은 계정입니다."); return; }
  currentDept = dept;
  if (weekData.locked) { toast("확정된 주입니다. 수정 불가."); return; }
  const cur = getQty(currentDept, currentDay, menu);
  const nv  = Math.max(0, cur + delta);
  // 낙관적 업데이트 (UI 즉시 반영)
  if (!weekData.orders[currentDept]) weekData.orders[currentDept] = {};
  if (!weekData.orders[currentDept][currentDay]) weekData.orders[currentDept][currentDay] = {};
  weekData.orders[currentDept][currentDay][menu] = nv;
  document.getElementById("q_" + menu).textContent = nv;
  try {
    await saveQty(currentDept, currentDay, menu, nv);
  } catch(e) {
    toast("저장 실패: " + e.message);
  }
};

// ─── 렌더 ────────────────────────────────────────────────────
function render() {
  const locked = weekData.locked;

  // 상태 뱃지
  document.getElementById("statusBadge").className   = "badge " + (locked ? "badge-locked" : "badge-open");
  document.getElementById("statusBadge").innerHTML   = locked
    ? '<i class="ti ti-lock"></i> 확정됨'
    : isSaturdayMode
      ? '<i class="ti ti-calendar-week"></i> 토요일 입력'
      : '<i class="ti ti-lock-open"></i> 입력 중';
  renderCalendar();
  const dw = document.getElementById("adminDeptWrap");
  if (dw) dw.style.display = isAdmin ? "" : "none";
  if (isAdmin) {
    const lbl = document.getElementById("menuSetLabel");
    if (lbl) lbl.innerHTML = (isSaturdayMode ? "토요일 메뉴 설정" : "이번 주 메뉴 설정") + ' <span style="color:var(--text3);font-size:11px">(최대 5개)</span>';
    renderMenuEditor();
  }

  // 확정 버튼 & 정산탭 (관리자만 표시)
  const cb = document.getElementById("confirmBtn");
  const ub = document.getElementById("unlockBtn");
  const locked2 = weekData.locked || false;
  if (cb) { cb.style.display = isAdmin && !locked2 ? "" : "none"; cb.textContent = "이번 주 확정"; }
  if (ub) ub.style.display = isAdmin && locked2 ? "" : "none";
  const bt = document.getElementById("billingTab");
  if (bt) bt.style.display = isAdmin ? "" : "none";

  renderInputTab(locked);
  renderSummaryTab(locked);
}

function renderInputTab(locked) {
  if (!currentDept && !isAdmin) {
    document.getElementById("tab-input").innerHTML =
      `<div class="notice notice-warn"><i class="ti ti-alert-circle"></i> 등록되지 않은 계정입니다. 관리자에게 문의하세요.</div>`;
    return;
  }

  // 관리자: 부서 선택 드롭다운
  const deptSel = document.getElementById("adminDeptSel");
  if (isAdmin && deptSel) {
    deptSel.style.display = "";
    if (deptSel.options.length === 0) {
      DEPTS_LIST().forEach(d => {
        const o = document.createElement("option");
        o.value = d; o.textContent = d; deptSel.appendChild(o);
      });
      deptSel.value = currentDept || "기획실";
    }
    currentDept = deptSel.value;
  }

  const wLocked = weekData.locked || false;
  if (wLocked && !isAdmin) {
    document.getElementById("inputArea").innerHTML =
      `<div class="notice notice-danger"><i class="ti ti-lock"></i> 이번 주는 확정되었습니다. 수정 불가.</div>`;
    renderMyWeekTable();
    return;
  }

  if (wLocked && isAdmin) {
    document.getElementById("inputArea").innerHTML =
      `<div class="notice notice-warn" style="margin-bottom:1rem"><i class="ti ti-lock"></i> 확정된 주입니다. 집계표 탭에서 잠금 해제 후 수정 가능합니다.</div>`;
    // 메뉴카드는 계속 렌더 (잠금 해제 후 바로 수정 가능하도록)
  } else {
    document.getElementById("inputArea").innerHTML = "";
  }

  // 요일 탭
  const tabDays = isSaturdayMode ? ["토"] : DAYS;
  document.getElementById("dayTabs").innerHTML = tabDays.map(d =>
    `<button class="day-btn${d === currentDay ? " active" : ""}${d==="토"?" day-btn-sat":""}" onclick="selectDay('${d}')">${d}요일</button>`
  ).join("");

  // 메뉴 카드
  document.getElementById("menuGrid").innerHTML = currentMenus.map(m => `
    <div class="menu-card">
      <p class="menu-label">${m}</p>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${m}',-1)">−</button>
        <span class="qty-val" id="q_${m}">${getQty(currentDept, currentDay, m)}</span>
        <button class="qty-btn" onclick="changeQty('${m}',1)">+</button>
      </div>
    </div>`).join("");

  renderMyWeekTable();
}

function renderMyWeekTable() {
  const dept = currentDept;
  if (!dept) return;
  const el = document.getElementById("myWeekTable");
  if (!el) return;
  const tableDays = isSaturdayMode ? ["토"] : DAYS;
  const rows = tableDays.map(d => {
    const vals = currentMenus.map(m => getQty(dept, d, m));
    const total = vals.reduce((s,v)=>s+v,0);
    return `<tr>
      <td class="td-label">${d}</td>
      ${vals.map(v=>`<td>${v||""}</td>`).join("")}
      <td class="td-total">${total||""}</td>
    </tr>`;
  }).join("");
  const colTotals = currentMenus.map(m => tableDays.reduce((s,d)=>s+getQty(dept,d,m),0));
  const grand = colTotals.reduce((s,v)=>s+v,0);
  const modeLabel = isSaturdayMode ? "토요일" : "이번 주";
  el.innerHTML = `
    <p class="section-label" style="margin-top:1.5rem">${dept} ${modeLabel} 입력 현황</p>
    <div style="overflow-x:auto">
    <table class="s-table">
      <thead><tr>
        <th>요일</th>${currentMenus.map(m=>`<th>${m}</th>`).join("")}<th>합계</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="tr-total">
          <td class="td-label">합계</td>
          ${colTotals.map(v=>`<td>${v||""}</td>`).join("")}
          <td class="td-total">${grand||""}</td>
        </tr>
      </tbody>
    </table>
    </div>`;
}

function renderSummaryTab(locked) {
  const uniqueDepts = [...new Set(Object.values(DEPT_MAP))];
  document.getElementById("deptStatus").innerHTML = uniqueDepts.map(dept =>
    `<span class="badge ${deptHasData(dept) ? "badge-open" : "badge-muted"}">${dept} ${deptHasData(dept) ? "✓" : "미입력"}</span>`
  ).join("");

  if (isSaturdayMode) {
    renderSaturdaySummary();
  } else {
    renderWeekdaySummary();
  }
}

function renderWeekdaySummary() {
  const l1 = document.getElementById("summaryLabel1");
  const l2 = document.getElementById("summaryLabel2");
  if (l1) { l1.style.display = ""; l1.textContent = "부서별 집계"; }
  if (l2) l2.textContent = "요일별 집계";
  const depts = DEPTS_LIST();

  // ① 부서별 표 (행=메뉴, 열=부서) - 전체 주간 합산
  const deptRows = currentMenus.map(m => {
    const vals = depts.map(dept => DAYS.reduce((s,d) => s + getQty(dept,d,m), 0));
    const total = vals.reduce((s,v) => s+v, 0);
    return `<tr>
      <td class="td-label">${m}</td>
      ${vals.map(v => `<td>${v||""}</td>`).join("")}
      <td class="td-total">${total||""}</td>
    </tr>`;
  }).join("");
  const deptTotals = depts.map(dept =>
    currentMenus.reduce((s,m) => s + DAYS.reduce((s2,d) => s2 + getQty(dept,d,m), 0), 0)
  );
  const deptGrand = deptTotals.reduce((s,v) => s+v, 0);

  document.getElementById("summaryTableByDept").innerHTML = `
    <table class="s-table">
      <thead><tr>
        <th>메뉴</th>${depts.map(d => `<th>${d}</th>`).join("")}<th>합계</th>
      </tr></thead>
      <tbody>
        ${deptRows}
        <tr class="tr-total">
          <td class="td-label">합계</td>
          ${deptTotals.map(v => `<td>${v||""}</td>`).join("")}
          <td class="td-total">${deptGrand||""}</td>
        </tr>
      </tbody>
    </table>`;

  // ② 요일별 표 (행=요일, 열=메뉴) - 기존 유지
  const rows = DAYS.map(d => {
    const vals = currentMenus.map(m => depts.reduce((s, dept) => s + getQty(dept, d, m), 0));
    const total = vals.reduce((s,v) => s+v, 0);
    return `<tr>
      <td class="td-label">${d}</td>
      ${vals.map(v => `<td>${v||""}</td>`).join("")}
      <td class="td-total">${total||""}</td>
    </tr>`;
  }).join("");
  const menuTotals = currentMenus.map(m =>
    DAYS.reduce((s,d) => s + depts.reduce((s2,dept) => s2 + getQty(dept,d,m), 0), 0)
  );
  const grandTotal = menuTotals.reduce((s,v) => s+v, 0);

  document.getElementById("summaryTable").innerHTML = `
    <table class="s-table">
      <thead><tr>
        <th>요일</th>${currentMenus.map(m => `<th>${m}</th>`).join("")}<th>합계</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="tr-total">
          <td class="td-label">합계</td>
          ${menuTotals.map(v => `<td>${v||""}</td>`).join("")}
          <td class="td-total">${grandTotal||""}</td>
        </tr>
      </tbody>
    </table>`;
}

function renderSaturdaySummary() {
  // 토요일 모드에서 부서별 표 숨김
  const dbd = document.getElementById("summaryTableByDept");
  if (dbd) dbd.innerHTML = "";
  const l1 = document.getElementById("summaryLabel1");
  const l2 = document.getElementById("summaryLabel2");
  if (l1) l1.style.display = "none";
  if (l2) l2.textContent = "토요일 부서별 집계";
  const depts = DEPTS_LIST();
  const menuRows = currentMenus.map(m => {
    const vals = depts.map(dept => getQty(dept, "토", m));
    const total = vals.reduce((s,v) => s+v, 0);
    return { menu: m, vals, total };
  });
  const deptTotals = depts.map(dept =>
    currentMenus.reduce((s,m) => s + getQty(dept, "토", m), 0)
  );
  const grandTotal = deptTotals.reduce((s,v) => s+v, 0);
  const rows = menuRows.map(r => `
    <tr>
      <td class="td-label">${r.menu}</td>
      ${r.vals.map(v => `<td>${v||""}</td>`).join("")}
      <td class="td-total">${r.total||""}</td>
    </tr>`).join("");
  document.getElementById("summaryTable").innerHTML = `
    <div style="overflow-x:auto"><table class="s-table">
      <thead><tr>
        <th>메뉴</th>
        ${depts.map(d => `<th>${d}</th>`).join("")}
        <th>합계</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="tr-total">
          <td class="td-label">합계</td>
          ${deptTotals.map(v => `<td>${v||""}</td>`).join("")}
          <td class="td-total">${grandTotal||""}</td>
        </tr>
      </tbody>
    </table></div>`;
}

function initBillingMonthSel() {
  const sel = document.getElementById("billingMonthSel");
  if (!sel || sel.options.length > 0) return;
  const names = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const months = [...new Set(WEEKS.filter(w => w.mon).map(w => w.mon.getMonth()))];
  months.forEach(m => {
    const o = document.createElement("option");
    o.value = m; o.textContent = `2026년 ${names[m]}`;
    sel.appendChild(o);
  });
  sel.value = new Date().getMonth();
}

window.renderBillingTab = async function() {
  initBillingMonthSel();
  const PRICE = 7000;
  const sel = document.getElementById("billingMonthSel");
  const targetMonth = parseInt(sel.value);

  document.getElementById("billingTable").innerHTML =
    `<p style="color:var(--text2);font-size:13px;padding:1rem 0">불러오는 중...</p>`;

  const weeksInMonth = WEEKS.filter(w => w.mon && w.mon.getMonth() === targetMonth);

  // 캐시에 없는 주차는 Firestore에서 fetch
  await Promise.all(weeksInMonth.map(async w => {
    if (!allWeeksCache[w.key]) {
      try {
        const snap = await getDoc(doc(db, "weeks", w.key));
        allWeeksCache[w.key] = snap.exists() ? snap.data() : { locked: false, orders: {} };
      } catch(e) {
        allWeeksCache[w.key] = { locked: false, orders: {} };
      }
    }
  }));

  let rows = "";
  let totalQty = 0;

  weeksInMonth.forEach(w => {
    const wData = allWeeksCache[w.key];
    const WEEKDAYS = ["월","화","수","목","금"];
    const qty = wData ? DEPTS_LIST().reduce((s, dept) =>
      s + WEEKDAYS.reduce((s2, d) =>
        s2 + currentMenus.reduce((s3, menu) =>
          s3 + (wData.orders?.[dept]?.[d]?.[menu] || 0), 0), 0), 0) : 0;
    totalQty += qty;
    const label = `${w.mon.getMonth()+1}월 ${w.mon.getDate()}일`;
    rows += `<tr>
      <td class="td-label">${label}</td>
      <td style="text-align:center">${qty || 0}</td>
      <td style="text-align:right;padding-right:12px">${qty > 0 ? (qty*PRICE).toLocaleString()+"원" : "-"}</td>
    </tr>`;
  });

  const totalAmt = totalQty > 0 ? (totalQty*PRICE).toLocaleString()+"원" : "-";

  document.getElementById("billingTable").innerHTML = `
    <table class="s-table" style="max-width:360px">
      <thead><tr>
        <th style="text-align:left;padding-left:10px">일자</th>
        <th style="text-align:center">개수</th>
        <th style="text-align:right;padding-right:12px">금액</th>
      </tr></thead>
      <tbody>
        ${rows}
        <tr class="tr-total">
          <td class="td-label">합계</td>
          <td style="text-align:center">${totalQty}</td>
          <td style="text-align:right;padding-right:12px;font-weight:500">${totalAmt}</td>
        </tr>
      </tbody>
    </table>`;
};

function getMondayOfWeek(weekKey) {
  const match = weekKey.match(/(\d{4})-W(\d{2})/);
  if (!match) return null;
  const year = parseInt(match[1]);
  const week = parseInt(match[2]);
  const jan4 = new Date(year, 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() || 7) - 1));
  const mon = new Date(startOfWeek1);
  mon.setDate(startOfWeek1.getDate() + (week - 1) * 7);
  return mon;
}

function DEPTS_LIST() { return [...new Set(Object.values(DEPT_MAP))]; }

window.onAdminDeptChange = function(val) {
  currentDept = val;
  render();
};

function renderMenuEditor() {
  const wrap = document.getElementById("menuEditorWrap");
  if (!wrap) return;
  const menus = currentMenus;
  let html = menus.map((m, i) => `
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
      <input type="text" value="${m}" id="menuInput_${i}"
        style="flex:1;height:32px;padding:0 8px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px"
        placeholder="메뉴명 입력">
      <button onclick="removeMenu(${i})" style="width:28px;height:28px;border:0.5px solid var(--border2);border-radius:var(--radius);background:none;color:var(--text2);cursor:pointer;font-size:16px">×</button>
    </div>`).join("");
  if (menus.length < 5) {
    html += `<button onclick="addMenu()" style="font-size:12px;padding:4px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:none;color:var(--text2);cursor:pointer;margin-bottom:8px">+ 메뉴 추가</button>`;
  }
  html += `<button onclick="saveMenus()" style="display:block;width:100%;padding:8px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;cursor:pointer;font-weight:500">메뉴 저장</button>`;
  wrap.innerHTML = html;
}

window.addMenu = function() {
  if (currentMenus.length >= 5) return;
  currentMenus.push("");
  renderMenuEditor();
};

window.removeMenu = function(i) {
  currentMenus.splice(i, 1);
  renderMenuEditor();
  render();
};

window.saveMenus = async function() {
  const inputs = currentMenus.map((_, i) => {
    const el = document.getElementById("menuInput_" + i);
    return el ? el.value.trim() : "";
  }).filter(v => v.length > 0);
  if (inputs.length === 0) { toast("메뉴를 1개 이상 입력해주세요."); return; }
  currentMenus = inputs;
  const ref = doc(db, "weeks", currentWeekKey);
  const snap = await getDoc(ref);
  const menuKey = isSaturdayMode ? "satMenus" : "menus";
  if (snap.exists()) {
    await updateDoc(ref, { [menuKey]: currentMenus });
  } else {
    await setDoc(ref, { locked: false, orders: {}, [menuKey]: currentMenus });
  }
  toast("메뉴가 저장되었습니다.");
  renderMenuEditor();
  renderMyWeekTable();
  // 요일탭/메뉴카드 갱신
  const tabDays2 = isSaturdayMode ? ["토"] : DAYS;
  document.getElementById("dayTabs").innerHTML = tabDays2.map(d =>
    `<button class="day-btn${d === currentDay ? " active" : ""}${d==="토"?" day-btn-sat":""}" onclick="selectDay('${d}')">${d}요일</button>`
  ).join("");
  document.getElementById("menuGrid").innerHTML = currentMenus.map(m => `
    <div class="menu-card">
      <p class="menu-label">${m}</p>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${m}',-1)">−</button>
        <span class="qty-val" id="q_${m}">${getQty(currentDept, currentDay, m)}</span>
        <button class="qty-btn" onclick="changeQty('${m}',1)">+</button>
      </div>
    </div>`).join("");
};

let curWeekIdx = 0;
let calYear = 2026;
let calMonth = (new Date()).getMonth(); // 0-based

function renderCalendar() {
  const wrap = document.getElementById("calendarWrap");
  if (!wrap) return;

  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth + 1, 0);
  const monthNames = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

  let cells = "";
  // 빈칸 (1일 전 요일만큼)
  let startDow = firstDay.getDay(); // 0=일
  // 월요일 시작으로 조정
  startDow = (startDow === 0) ? 6 : startDow - 1;
  for (let i = 0; i < startDow; i++) cells += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth, d);
    const dow  = date.getDay(); // 0=일, 1=월
    const isMonday = dow === 1;
    const isSaturday = dow === 6;
    // 이 날짜가 속한 주의 weekKey 계산 (월요일 기준)
    let wk = null;
    if (isMonday) {
      wk = `2026-W${String(getISOWeek(date)).padStart(2,"0")}`;
    } else if (isSaturday) {
      const mon = new Date(date); mon.setDate(date.getDate() - 5);
      wk = `2026-W${String(getISOWeek(mon)).padStart(2,"0")}`;
    }
    const isSatSelected = isSaturdayMode && isSaturday && wk === currentWeekKey;
    const isSelected = (!isSaturdayMode && isMonday && wk === currentWeekKey) || isSatSelected;
    const isToday = date.toDateString() === new Date().toDateString();
    const locked = wk ? (weekData && weekData.locked) : false;

    let cls = "cal-cell";
    if (!isMonday) cls += " cal-disabled";
    if (isMonday)  cls += " cal-monday";
    if (isSaturday) cls += " cal-sat";
    if (isSelected && isMonday) cls += " cal-selected";
    if (isToday)   cls += " cal-today";
    if (locked && isMonday) cls += " cal-locked";

    let onclick = "";
    if (isMonday) onclick = `onclick="selectWeekByMonday(${calYear},${calMonth},${d})"`;
    else if (isSaturday) onclick = `onclick="selectSaturday(${calYear},${calMonth},${d})"`;
    cells += `<div class="${cls}" ${onclick}>${d}</div>`;
  }

  wrap.innerHTML = `
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="shiftMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="cal-month">${calYear}년 ${monthNames[calMonth]}</span>
        <button class="cal-nav" onclick="shiftMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-dow-row">
        ${["월","화","수","목","금","토","일"].map((d,i)=>`<div class="cal-dow${i===5?' cal-dow-sat':''}">${d}</div>`).join("")}
      </div>
      <div class="cal-grid">${cells}</div>
      <p class="cal-hint"><i class="ti ti-info-circle"></i> 월요일을 클릭해 해당 주 수량을 입력하세요</p>
    </div>`;
}

window.shiftMonth = function(delta) {
  calMonth += delta;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  renderCalendar();
};

window.selectWeekByMonday = function(y, m, d) {
  const date = new Date(y, m, d);
  const wk = `2026-W${String(getISOWeek(date)).padStart(2,"0")}`;
  currentWeekKey = wk;
  currentDay = "월";
  isSaturdayMode = false;
  subscribeWeek();
};

window.selectSaturday = function(y, m, d) {
  const date = new Date(y, m, d);
  // 토요일이 속한 주의 월요일 찾기 (토요일 - 5일)
  const mon = new Date(date); mon.setDate(date.getDate() - 5);
  const wk = `2026-W${String(getISOWeek(mon)).padStart(2,"0")}`;
  currentWeekKey = wk;
  currentDay = "토";
  isSaturdayMode = true;
  subscribeWeek();
};

// ─── 토스트 ──────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>

    <button class="tab" id="billingTab" onclick="switchTab('billing', this)" style="display:none">정산</button>
  </div>

  <!-- 입력 탭 -->
  <div id="tab-input">
    <div style="display:none;margin-bottom:1rem" id="adminDeptWrap">
      <p class="section-label">부서 선택 (관리자)</p>
      <select id="adminDeptSel" style="display:none;margin-bottom:12px" onchange="onAdminDeptChange(this.value)"></select>
      <p class="section-label" id="menuSetLabel">이번 주 메뉴 설정 <span style="color:var(--text3);font-size:11px">(최대 5개)</span></p>
      <div id="menuEditorWrap"></div>
    </div>
    <p class="section-label">요일 선택</p>
    <div class="day-tabs" id="dayTabs"></div>
    <p class="section-label" id="menuLabel"></p>
    <div class="menu-grid" id="menuGrid"></div>
    <div id="inputArea"></div>
    <div id="myWeekTable"></div>
  </div>

  <!-- 집계 탭 -->
  <div id="tab-summary" style="display:none">
    <p class="section-label">부서별 입력 현황</p>
    <div class="dept-chips" id="deptStatus"></div>
    <p class="section-label" id="summaryLabel1">부서별 집계</p>
    <div id="summaryTableByDept" style="overflow-x:auto;margin-bottom:1.5rem"></div>
    <p class="section-label" id="summaryLabel2">요일별 집계</p>
    <div id="summaryTable" style="overflow-x:auto"></div>

    <div class="action-bar">
      <button id="confirmBtn" style="display:none">이번 주 확정</button>
      <button id="unlockBtn" style="display:none" onclick="unlockWeek()">수정 잠금 해제</button>
    </div>
  </div>
</div>

  <!-- 정산 탭 -->
  <div id="tab-billing" style="display:none">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:8px">
        <select id="billingMonthSel" onchange="renderBillingTab()"></select>
        <span style="font-size:12px;color:var(--text2)">1개 × 7,000원</span>
      </div>
    </div>
    <div id="billingTable" style="display:flex;justify-content:center"></div>
  </div>

<div id="toast"></div>
</body>
</html>
